name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # Builds bubble-detector statically against vendored OpenCV per platform/arch.
  # Always runs on release — the build job below downloads these artifacts before
  # invoking electron-builder so the installer ships the prebuilt .node files
  # instead of failing at runtime when node-gyp-build can't resolve a prebuild.
  native-prebuild:
    name: Native Prebuild (${{ matrix.platform }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          # TODO(B.4 follow-up): re-enable macos-13 (darwin-x64) once the
          # build matrix below also adds an Intel macOS entry. v0.3 ships
          # arm64-only macOS — Intel users go through Rosetta.
          # - os: macos-13
          #   platform: darwin
          #   arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Cache OpenCV install + build
        id: cache-opencv
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-${{ matrix.arch }}-opencv-4.11.0-${{ hashFiles('native/bubble-detector/scripts/build-opencv.*') }}
          path: |
            native/bubble-detector/vendor/opencv-install
            native/bubble-detector/vendor/opencv-build

      - name: Build OpenCV (POSIX)
        if: steps.cache-opencv.outputs.cache-hit != 'true' && runner.os != 'Windows'
        shell: bash
        env:
          KIREI_OPENCV_TARGET_ARCH: ${{ matrix.arch == 'arm64' && 'arm64' || 'x86_64' }}
        run: bash native/bubble-detector/scripts/build-opencv.sh

      - name: Build OpenCV (Windows)
        if: steps.cache-opencv.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: pwsh native/bubble-detector/scripts/build-opencv.ps1

      - name: Export OpenCV env (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # shellcheck disable=SC1091
          . native/bubble-detector/vendor/opencv-env.sh
          {
            echo "OPENCV_INCLUDE_DIR=${OPENCV_INCLUDE_DIR}"
            echo "OPENCV_LIB_DIR=${OPENCV_LIB_DIR}"
            echo "OPENCV_3RDPARTY_DIR=${OPENCV_3RDPARTY_DIR}"
          } >> "$GITHUB_ENV"

      - name: Export OpenCV env (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          . native/bubble-detector/vendor/opencv-env.ps1
          Add-Content -Path $env:GITHUB_ENV -Value "OPENCV_INCLUDE_DIR=$env:OPENCV_INCLUDE_DIR"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENCV_LIB_DIR=$env:OPENCV_LIB_DIR"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENCV_3RDPARTY_DIR=$env:OPENCV_3RDPARTY_DIR"

      - run: pnpm install --frozen-lockfile

      # Built shared package is required by the desktop smoke spec's
      # service.ts → `@kireimanga/shared` import (jest.config maps it to dist/).
      - name: Build shared package
        run: pnpm build:packages

      - name: Build prebuild
        run: pnpm --filter @kireimanga/bubble-detector run prebuild

      - name: Verify prebuild loads
        run: node -e "console.log(require('./native/bubble-detector'))"

      # Slice B.6: tagged releases get the same C++/Node test guarantees CI
      # runs per-PR — keeps a release from shipping a regression that slipped
      # in between the last green CI and the tag.
      - name: Build C++ tests
        shell: bash
        run: |
          cmake -S native/bubble-detector/test \
                -B native/bubble-detector/test/build \
                -DCMAKE_BUILD_TYPE=Release
          cmake --build native/bubble-detector/test/build --config Release --parallel

      - name: Run C++ tests
        shell: bash
        run: ctest --test-dir native/bubble-detector/test/build --output-on-failure -C Release

      - name: Run Node smoke test (real addon)
        shell: bash
        working-directory: apps/desktop
        run: npx jest --testPathPatterns=bubble-detector.smoke

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: bubble-detector-${{ matrix.platform }}-${{ matrix.arch }}
          path: native/bubble-detector/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 30

  build:
    needs: [lint, typecheck, test, native-prebuild]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            nativePlatform: darwin
            nativeArch: arm64
          - os: windows-latest
            platform: win
            nativePlatform: win32
            nativeArch: x64
        # TODO(B.4 follow-up): add a macos-13 entry mapped to darwin-x64 when
        # we want to ship native Intel macOS builds. For v0.3, Intel macOS
        # users run the arm64 build under Rosetta.

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Extract version and channel from tag
        id: version
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if echo "${VERSION}" | grep -qE '\-beta(\.|$)'; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          elif echo "${VERSION}" | grep -qE '\-alpha(\.|$)'; then
            echo "channel=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync package.json versions for tag
        shell: bash
        run: bash ./scripts/set-version-ci.sh "${{ steps.version.outputs.version }}"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download bubble-detector prebuild
        uses: actions/download-artifact@v4
        with:
          name: bubble-detector-${{ matrix.nativePlatform }}-${{ matrix.nativeArch }}
          path: native/bubble-detector/prebuilds/${{ matrix.nativePlatform }}-${{ matrix.nativeArch }}/

      - run: pnpm build:packages

      - name: Build web frontend
        run: pnpm --filter @kireimanga/web build

      - name: Build desktop app
        run: pnpm --filter @kireimanga/desktop build

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        working-directory: apps/desktop
        run: pnpm exec electron-builder --mac --publish never -c.publish.channel=${{ steps.version.outputs.channel }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package (Windows)
        if: matrix.platform == 'win'
        shell: bash
        working-directory: apps/desktop
        run: pnpm exec electron-builder --win --publish never -c.publish.channel=${{ steps.version.outputs.channel }}

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*-mac.yml
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/latest.yml
          if-no-files-found: error
          retention-days: 30

  upload:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: artifacts/macos-builds

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: artifacts/windows-builds

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            artifacts/macos-builds/*.dmg
            artifacts/macos-builds/*-mac.yml
            artifacts/windows-builds/*.exe
            artifacts/windows-builds/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
