name: CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.web == 'true' || steps.filter.outputs.desktop == 'true' }}
      web: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.web == 'true' }}
      desktop: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.desktop == 'true' }}
      native: ${{ steps.filter.outputs.native == 'true' }}
      sidecar: ${{ steps.filter.outputs.sidecar == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            root:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'eslint.config.mjs'
              - '.prettierrc'
            ci:
              - '.github/**'
            shared:
              - 'packages/shared/**'
            web:
              - 'apps/web/**'
            desktop:
              - 'apps/desktop/**'
            native:
              - 'native/**'
              - '.github/workflows/ci.yml'
            sidecar:
              - 'sidecar/**'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type Check
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm typecheck

  test-web:
    name: Test Web
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm --filter @kireimanga/web test

  test-desktop:
    name: Test Desktop
    needs: [changes]
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm --filter @kireimanga/desktop test

  # Validates the bubble-detector compiles + links statically against vendored OpenCV.
  # Artifact is consumed by release.yml.
  native-prebuild:
    name: Native Prebuild (${{ matrix.platform }}-${{ matrix.arch }})
    needs: [changes]
    if: needs.changes.outputs.native == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Cache OpenCV install + build
        id: cache-opencv
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-${{ matrix.arch }}-opencv-4.11.0-${{ hashFiles('native/bubble-detector/scripts/build-opencv.*') }}
          path: |
            native/bubble-detector/vendor/opencv-install
            native/bubble-detector/vendor/opencv-build

      - name: Build OpenCV (POSIX)
        if: steps.cache-opencv.outputs.cache-hit != 'true' && runner.os != 'Windows'
        shell: bash
        env:
          KIREI_OPENCV_TARGET_ARCH: ${{ matrix.arch == 'arm64' && 'arm64' || 'x86_64' }}
        run: bash native/bubble-detector/scripts/build-opencv.sh

      - name: Build OpenCV (Windows)
        if: steps.cache-opencv.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: pwsh native/bubble-detector/scripts/build-opencv.ps1

      - name: Export OpenCV env (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # shellcheck disable=SC1091
          . native/bubble-detector/vendor/opencv-env.sh
          {
            echo "OPENCV_INCLUDE_DIR=${OPENCV_INCLUDE_DIR}"
            echo "OPENCV_LIB_DIR=${OPENCV_LIB_DIR}"
            echo "OPENCV_3RDPARTY_DIR=${OPENCV_3RDPARTY_DIR}"
          } >> "$GITHUB_ENV"

      - name: Export OpenCV env (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          . native/bubble-detector/vendor/opencv-env.ps1
          Add-Content -Path $env:GITHUB_ENV -Value "OPENCV_INCLUDE_DIR=$env:OPENCV_INCLUDE_DIR"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENCV_LIB_DIR=$env:OPENCV_LIB_DIR"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENCV_3RDPARTY_DIR=$env:OPENCV_3RDPARTY_DIR"

      - run: pnpm install --frozen-lockfile

      # Built shared package is required by the desktop smoke spec's
      # service.ts → `@kireimanga/shared` import (jest.config maps it to dist/).
      - name: Build shared package
        run: pnpm build:packages

      - name: Build prebuild
        run: pnpm --filter @kireimanga/bubble-detector run prebuild

      - name: Verify prebuild loads
        run: node -e "console.log(require('./native/bubble-detector'))"

      # Slice B.6: standalone CMake harness builds the GoogleTest binary
      # against the same vendored OpenCV install (env vars carried over from
      # the "Export OpenCV env" step). bash works on windows-latest via Git
      # Bash, so a single shell keeps the matrix identical across OSes.
      - name: Build C++ tests
        shell: bash
        run: |
          cmake -S native/bubble-detector/test \
                -B native/bubble-detector/test/build \
                -DCMAKE_BUILD_TYPE=Release
          cmake --build native/bubble-detector/test/build --config Release --parallel

      - name: Run C++ tests
        shell: bash
        run: ctest --test-dir native/bubble-detector/test/build --output-on-failure -C Release

      # Slice B.6: end-to-end smoke test — the real addon was just built and
      # node-gyp-build resolves it from native/bubble-detector/prebuilds/.
      # The mocked unit spec runs in `test-desktop` (Linux, no prebuild);
      # this is the actual integration check.
      - name: Run Node smoke test (real addon)
        shell: bash
        working-directory: apps/desktop
        run: npx jest --testPathPatterns=bubble-detector.smoke

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: bubble-detector-${{ matrix.platform }}-${{ matrix.arch }}
          path: native/bubble-detector/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 30

  # Validates the manga-ocr sidecar bundles to a single executable. Artifact
  # is consumed by release.yml and downloaded by the desktop on first
  # translation request. Matrix mirrors native-prebuild — same OS/arch tuples.
  sidecar-build:
    name: Sidecar Build (${{ matrix.platform }}-${{ matrix.arch }})
    needs: [changes]
    if: needs.changes.outputs.sidecar == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            sidecar/manga-ocr/requirements.txt
            sidecar/manga-ocr/requirements-build.txt

      - name: Cache pip download cache
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-${{ matrix.arch }}-sidecar-py3.11-${{ hashFiles('sidecar/manga-ocr/requirements*.txt') }}
          path: |
            ~/.cache/pip
            ~/AppData/Local/pip/Cache

      - name: Install sidecar dependencies
        shell: bash
        run: pip install -r sidecar/manga-ocr/requirements.txt -r sidecar/manga-ocr/requirements-build.txt

      - name: Build sidecar bundle
        shell: bash
        run: python sidecar/manga-ocr/build.py

      - name: Verify bundle exists
        shell: bash
        run: |
          set -euo pipefail
          out_dir="sidecar/manga-ocr/release/${{ matrix.platform }}-${{ matrix.arch }}"
          binary="kirei-ocr"
          if [[ "${{ matrix.platform }}" == "win32" ]]; then
            binary="kirei-ocr.exe"
          fi
          ls -la "$out_dir"
          test -f "$out_dir/$binary"

      - uses: actions/upload-artifact@v4
        with:
          name: kirei-ocr-${{ matrix.platform }}-${{ matrix.arch }}
          path: sidecar/manga-ocr/release/${{ matrix.platform }}-${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0  # binary is already PyInstaller-compressed; double-zip wastes time

  ci-result:
    name: CI Result
    if: always()
    needs: [lint, typecheck, test-web, test-desktop, native-prebuild, sidecar-build]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI outcome
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"
